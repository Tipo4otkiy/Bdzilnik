<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRM Бджоляр</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f4f9; color: #333; }
        header { background: #ffca28; padding: 10px 15px; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .user-info { font-size: 12px; text-align: right; line-height: 1.2; }
        
        main { padding: 15px; padding-bottom: 80px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; transition: border 0.2s; }
        input:focus { border-color: #ffca28; }
        button { width: 100%; padding: 12px; background: #ffca28; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        .btn-secondary { background: #eee; color: #333; }
        .btn-small { padding: 6px 10px; font-size: 12px; width: auto; margin-top: 5px; cursor: pointer; border: none; border-radius: 6px; }
        .btn-danger { background: #ffebee; color: #d32f2f; border: 1px solid #ffcdd2; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: flex-start; overflow-y: auto; padding: 20px 0; }
        .modal-content { background: white; width: 95%; max-width: 500px; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .item-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: #ffca28; border: none; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 50; }
        
        .autocomplete-wrapper { position: relative; width: 100%; margin-bottom: 5px; }
        .suggestions-box { position: absolute; top: calc(100% - 8px); left: 0; right: 0; background: white; border: 1px solid #ddd; border-top: none; border-radius: 0 0 8px 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); max-height: 280px; overflow-y: auto; z-index: 1000; display: none; }
        .suggestion-item { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 15px; line-height: 1.4; color: #222; }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: #f8f9fa; }
        .suggestion-loading { padding: 12px 15px; font-size: 14px; color: #888; text-align: center; }
        
        .delivery-toggle { display: flex; gap: 15px; margin: 10px 0 15px 0; background: #fff; padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        .delivery-toggle label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: bold; }
        
        .card-actions { display: flex; gap: 5px; justify-content: flex-end; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; flex-wrap: wrap; }
        .status-box { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #eee; }
        
        #blacklistWarning { display: none; background: #ffebee; border: 1px solid #ef9a9a; color: #c62828; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; line-height: 1.4; }
        .header-btn { background: none; border: none; font-size: 18px; padding: 5px 8px; border-radius: 6px; cursor: pointer; }
        .header-btn:hover { background: rgba(255,255,255,0.3); }

        .tabs { display: flex; background: white; margin-bottom: 15px; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab-btn { flex: 1; background: none; border: none; padding: 12px; font-weight: bold; color: #888; border-radius: 0; }
        .tab-btn.active { color: #333; background: #ffca28; }
        
        /* Кнопки продавців в Адмінці */
        .seller-chip { background: #eee; padding: 8px 12px; border-radius: 20px; font-size: 14px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .seller-chip.active { background: #fffde7; border-color: #ffca28; color: #f57f17; font-weight: bold; }
    </style>
</head>
<body>

<div id="loginScreen" style="max-width: 400px; margin: 80px auto; padding: 20px; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
    <div style="text-align: center; margin-bottom: 20px;">
        <span style="font-size: 40px;">🍯</span>
        <h2 style="margin: 10px 0 0 0;">Вхід у CRM</h2>
    </div>
    <input type="text" id="phoneInput" placeholder="📞 Номер телефону" style="background: #f9f9f9;">
    <input type="password" id="passwordInput" placeholder="🔒 Пароль" style="background: #f9f9f9;">
    <button id="authBtn" style="margin-top: 10px; padding: 15px;">Увійти</button>
</div>

<div id="mainApp" style="display: none;">
    <header>
        <div class="header-content">
            <div>🍯 <b>Бджоляр</b></div>
            <div style="display: flex; align-items: center; gap: 5px;">
                <div class="user-info" style="margin-right: 5px;">
                    <span id="displayUserName">Завантаження...</span><br>
                    <a href="#" id="logoutBtn" style="color: #666; font-size: 10px;">Вийти</a>
                </div>
                <button id="openBlacklistBtn" class="header-btn" title="Чорний список">🚫</button>
                <button id="openSettingsBtn" class="header-btn" title="Налаштування">⚙️</button>
            </div>
        </div>
        
        <div id="adminPanel" style="display: none; margin-top: 15px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <h3 style="margin: 0 0 10px 0; color: #333;">👑 Панель Адміністратора</h3>
            
            <div style="background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #eee;">
                <h4 style="margin: 0 0 10px 0; font-size: 14px;">➕ Створити продавця</h4>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <input type="text" id="adminNewName" placeholder="Ім'я" style="flex: 1; min-width: 100px; margin:0; padding: 8px;">
                    <input type="text" id="adminNewPhone" placeholder="Телефон" style="flex: 1.5; min-width: 140px; margin:0; padding: 8px;">
                    <input type="text" id="adminNewPass" placeholder="Пароль" style="flex: 1; min-width: 100px; margin:0; padding: 8px;">
                    <button id="adminRegBtn" class="btn-danger" style="flex: 1; min-width: 100px; margin:0; padding: 8px;">Створити</button>
                </div>
            </div>

            <h4 style="margin: 0 0 10px 0; font-size: 14px;">👥 Фільтр по продавцях:</h4>
            <div id="adminSellersList" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;">
                </div>
            
            <button id="adminShowAllBtn" class="btn-secondary btn-small" style="padding: 8px 15px; background: #e0e0e0;">🌍 Показати всі замовлення</button>
        </div>
    </header>

    <main>
        <div class="tabs">
            <button id="tabActiveBtn" class="tab-btn active">📦 Поточні</button>
            <button id="tabHistoryBtn" class="tab-btn">🕰️ Історія</button>
        </div>

        <input type="text" id="universalSearch" placeholder="🔍 Пошук (Ім'я, телефон, ТТН)..." style="background: white;">

        <div id="historyAnalytics" style="display: none; background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <h4 style="margin-top: 0; color: #333;">📊 Статистика продажів</h4>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <div style="flex: 1;"><label style="font-size:12px; color:#666;">З дати:</label><input type="date" id="statDateFrom" style="padding:8px; margin:0;"></div>
                <div style="flex: 1;"><label style="font-size:12px; color:#666;">По дату:</label><input type="date" id="statDateTo" style="padding:8px; margin:0;"></div>
            </div>
            <button id="calcStatBtn" class="btn-secondary" style="margin-bottom: 10px; background: #fffde7; color: #fbc02d; border: 1px solid #fff59d;">Підрахувати підсумки</button>
            <div id="statResult" style="font-size: 14px; line-height: 1.5;"></div>
        </div>

        <div id="appContent"></div>
    </main>
    <button id="fabBtn" class="fab">+</button>
</div>

<div id="ttnModal" class="modal" style="align-items: center;">
    <div class="modal-content">
        <h3>Додати ТТН</h3>
        <input type="text" id="ttnInput" placeholder="Введіть номер накладної...">
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="closeTtnBtn" class="btn-secondary">Скасувати</button>
            <button id="saveTtnBtn">Зберегти</button>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>Налаштування</h3>
        <label style="font-size: 12px; font-weight: bold; color: #666; display: block; margin-top: 5px;">Мої товари (Пресет)</label>
        <div id="presetsList"></div>
        <button id="addPresetBtn" class="btn-secondary" style="margin-top: 10px;">+ Додати товар</button>
        <hr>
        <button id="saveSettingsBtn">Зберегти налаштування</button>
        <button id="closeSettingsBtn" class="btn-secondary" style="margin-top: 10px;">Закрити</button>
    </div>
</div>

<div id="blacklistModal" class="modal">
    <div class="modal-content" style="background: #fdfaf6;">
        <h3 style="color: #c62828; border-bottom: 2px solid #ef9a9a; padding-bottom: 10px; margin-top: 0;">🚫 Чорний список клієнтів</h3>
        <div id="addBlForm" style="display: none; background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px;">
            <h4 style="margin-top: 0; color: #333;">Додати клієнта в ЧС</h4>
            <input type="text" id="blPhoneInput" placeholder="Номер телефону (+380...)">
            <input type="text" id="blNameInput" placeholder="Ім'я Прізвище (автопідтягування)">
            <div id="blPastOrdersInfo"></div> 
            <input type="text" id="blReasonInput" placeholder="Причина (обов'язково)">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="cancelBlBtn" class="btn-secondary">Скасувати</button>
                <button id="saveBlBtn" class="btn-danger">Додати в ЧС</button>
            </div>
        </div>
        <button id="showAddBlFormBtn" class="btn-danger" style="margin-bottom: 15px;">+ Додати порушника</button>
        <div id="blacklistContent" style="max-height: 400px; overflow-y: auto;"></div>
        <button id="closeBlacklistBtn" class="btn-secondary" style="margin-top: 15px;">Закрити</button>
    </div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content" style="padding-bottom: 50px;">
        <h3 id="orderModalTitle" style="margin-top:0">Нове замовлення</h3>
        <div id="blacklistWarning"></div>

        <div class="autocomplete-wrapper"><input type="text" id="newPhone" placeholder="📞 Телефон" autocomplete="off"><div id="phoneSuggestions" class="suggestions-box"></div></div>
        <div class="autocomplete-wrapper"><input type="text" id="newName" placeholder="👤 Ім'я Прізвище" autocomplete="off"><div id="nameSuggestions" class="suggestions-box"></div></div>
        
        <div class="delivery-toggle">
            <label><input type="radio" name="deliveryType" value="ukrposhta" checked> Укрпошта</label>
            <label><input type="radio" name="deliveryType" value="novaposhta"> Нова Пошта</label>
        </div>
        
        <div class="autocomplete-wrapper">
            <input type="text" id="newCity" placeholder="📍 Місто / Село (почніть вводити...)" autocomplete="off">
            <div id="citySuggestions" class="suggestions-box"></div>
        </div>
        
        <input type="text" id="newIndex" placeholder="📮 Індекс (наприклад: 01001)">

        <div style="display: flex; gap: 15px; margin: 10px 0 5px; font-size: 14px; padding: 0 5px;">
            <label style="cursor: pointer;"><input type="radio" name="addressType" value="branch" checked> 🏢 Відділення</label>
            <label style="cursor: pointer;"><input type="radio" name="addressType" value="street"> 🛣️ Вулиця</label>
        </div>

        <div class="autocomplete-wrapper">
            <input type="text" id="newBranch" placeholder="Номер або назва відділення..." autocomplete="off">
            <div id="branchSuggestions" class="suggestions-box"></div>
        </div>
        
        <div id="itemsContainer" style="margin-top: 15px;"></div>
        <button id="addItemBtn" class="btn-secondary" style="font-size: 14px; margin-bottom: 15px;">+ Додати позицію</button>
        
        <input type="text" id="newComment" placeholder="💬 Коментар до замовлення">
        
        <div style="display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; margin: 15px 0;">
            <span>Разом:</span><span id="orderTotal" style="color: #ffb300;">0 грн</span>
        </div>

        <div style="display: flex; gap: 10px;">
            <button id="closeOrderBtn" class="btn-secondary">Скасувати</button>
            <button id="saveOrderBtn">Зберегти</button>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
