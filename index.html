<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRM Бджоляр</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f4f9; }
        header { background: #ffca28; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 10; }
        main { padding: 15px; padding-bottom: 80px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #ffca28; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .search-bar { padding-left: 35px; background: white url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="gray" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>') no-repeat 10px center; }
        #loginScreen { max-width: 400px; margin: 50px auto; text-align: center; padding: 20px; }
        .timeline { border-left: 2px solid #ffca28; margin: 10px 0; padding-left: 15px; font-size: 14px; }
        
        /* Стилі для модального вікна */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: flex-start; overflow-y: auto; padding-top: 40px; padding-bottom: 40px;}
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 12px; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: #ffca28; border: none; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; z-index: 50; }
    </style>
</head>
<body>

<div id="loginScreen">
    <h2>Вхід у CRM</h2>
    <input type="text" id="phoneInput" placeholder="Номер телефону: +380...">
    <input type="password" id="passwordInput" placeholder="Пароль">
    <button id="authBtn">Увійти</button>
    <p id="authError" style="color: red; display: none;"></p>
</div>

<div id="mainApp" style="display: none;">
    <header>🍯 CRM Бджоляр</header>
    <main>
        <input type="text" id="universalSearch" class="search-bar" placeholder="Пошук по імені, номеру, ТТН...">
        <div id="appContent" style="margin-top: 15px;">
            <p style="text-align: center; color: #888;">Завантаження замовлень...</p>
        </div>
    </main>
    <button id="fabBtn" class="fab">+</button>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top: 0;">Нове замовлення</h3>
        <input type="text" id="newPhone" placeholder="Телефон клієнта (+380...)">
        <input type="text" id="newName" placeholder="Ім'я та Прізвище">
        <input type="text" id="newAddress" placeholder="Місто, Відділення пошти">
        
        <div id="itemsContainer" style="margin: 15px 0; border: 1px solid #eee; padding: 10px; border-radius: 8px;">
            <strong>Товари</strong>
            <div class="item-row" style="display: flex; gap: 5px; margin-top: 10px;">
                <input type="text" placeholder="Що продаємо?" style="flex: 2;" class="item-name">
                <input type="number" placeholder="К-ть" style="flex: 1;" class="item-qty" value="1">
                <input type="number" placeholder="Ціна" style="flex: 1.5;" class="item-price">
            </div>
        </div>
        
        <button id="addItemBtn" style="background: #f4f4f9; color: #333; margin-bottom: 15px;">+ Додати ще товар</button>
        <input type="text" id="newComment" placeholder="Коментар (необов'язково)">
        
        <div style="display: flex; justify-content: space-between; margin: 15px 0; font-size: 18px; font-weight: bold;">
            <span>Сума:</span>
            <span id="orderTotal">0 грн</span>
        </div>

        <div style="display: flex; gap: 10px;">
            <button id="closeModalBtn" style="background: #eee; color: #333;">Скасувати</button>
            <button id="saveOrderBtn">Зберегти</button>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
